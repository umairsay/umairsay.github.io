<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" width="800" height="500">
  <title>Skill groups: AI exposure vs projected growth</title>
  <rect width="800" height="500" fill="#F2EDE4"/>

  <!-- grid -->
  <g stroke="#D8D4CC" stroke-width="0.5">
    <line x1="70" y1="40" x2="70" y2="440"/>
    <line x1="223" y1="40" x2="223" y2="440"/>
    <line x1="377" y1="40" x2="377" y2="440"/>
    <line x1="530" y1="40" x2="530" y2="440"/>
    <line x1="683" y1="40" x2="683" y2="440"/>
    <line x1="70" y1="82" x2="760" y2="82"/>
    <line x1="70" y1="163" x2="760" y2="163"/>
    <line x1="70" y1="245" x2="760" y2="245"/>
    <line x1="70" y1="326" x2="760" y2="326"/>
  </g>

  <!-- zero-growth line -->
  <line x1="70" y1="313" x2="760" y2="313" stroke="#D8D4CC" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- axes -->
  <line x1="70" y1="40" x2="70" y2="440" stroke="#C8C4BC" stroke-width="0.5"/>
  <line x1="70" y1="440" x2="760" y2="440" stroke="#C8C4BC" stroke-width="0.5"/>
  <text x="70" y="465" font-family="'DM Mono',monospace" font-size="11" fill="#6B6760">low exposure</text>
  <text x="760" y="465" text-anchor="end" font-family="'DM Mono',monospace" font-size="11" fill="#6B6760">high exposure</text>

  <!-- bubbles: growth positive = navy, negative = red -->
  <g fill-opacity="0.5" stroke-width="1">
    <circle cx="663" cy="82"  r="9"  fill="#2E3A59" stroke="#2E3A59"/>
    <circle cx="208" cy="94"  r="17" fill="#2E3A59" stroke="#2E3A59"/>
    <circle cx="628" cy="163" r="13" fill="#2E3A59" stroke="#2E3A59"/>
    <circle cx="335" cy="222" r="8"  fill="#2E3A59" stroke="#2E3A59"/>
    <circle cx="303" cy="232" r="30" fill="#2E3A59" stroke="#2E3A59"/>
    <circle cx="225" cy="235" r="12" fill="#2E3A59" stroke="#2E3A59"/>
    <circle cx="544" cy="238" r="17" fill="#2E3A59" stroke="#2E3A59"/>
    <circle cx="340" cy="250" r="9"  fill="#2E3A59" stroke="#2E3A59"/>
    <circle cx="152" cy="353" r="32" fill="#A6453F" stroke="#A6453F"/>
    <circle cx="320" cy="367" r="14" fill="#A6453F" stroke="#A6453F"/>
    <circle cx="120" cy="391" r="10" fill="#A6453F" stroke="#A6453F"/>
  </g>

  <text x="400" y="475" text-anchor="middle" font-family="'DM Mono',monospace" font-size="11" letter-spacing="0.08em" fill="#6B6760">AI EXPOSURE &#215; PROJECTED GROWTH, BY SKILL GROUP</text>
</svg>
